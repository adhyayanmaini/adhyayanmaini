<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 80" width="830" height="80">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      
      .footer-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 11px;
        font-weight: 600;
        fill: #71717a;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      
      .sub-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 10px;
        font-weight: 400;
        fill: #3f3f46;
        letter-spacing: 0.5px;
      }
    </style>

    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>

    <!-- Moving Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="0%" y2="0%" gradientUnits="userSpaceOnUse">
      <animate attributeName="x1" from="-100%" to="200%" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="-50%" to="250%" dur="6s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#27272a" stop-opacity="0.3"/>
      <stop offset="45%" stop-color="#27272a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#27272a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#27272a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="830" height="80" rx="16" fill="url(#bg-grad)"/>
  <rect x="0.75" y="0.75" width="828.5" height="78.5" rx="15.25" fill="none" stroke="#27272a" stroke-width="1.5"/>

  <!-- Animated Laser Sweep Line -->
  <line x1="30" y1="15" x2="800" y2="15" stroke="url(#line-grad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Footer Typography -->
  <text x="415" y="44" class="footer-text" text-anchor="middle">Building. Shipping. Improving.</text>
  <text x="415" y="60" class="sub-text" text-anchor="middle">Maini Labs © 2026</text>
</svg>
