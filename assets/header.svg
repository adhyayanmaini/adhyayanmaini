<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 240" width="830" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Outfit:wght@400;600;700;800&amp;display=swap');
      
      .text-name {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 38px;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: -0.5px;
        opacity: 0;
        animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
      }
      
      .text-title {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: #3b82f6;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0;
        animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
      }
      
      .text-subtitle {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #8e8e93;
        letter-spacing: 0.2px;
        opacity: 0;
        animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>

    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>

    <!-- Glowing Spotlights -->
    <radialGradient id="glow-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-tr" cx="100%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-bl" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Border Gradients (Static and Sweeping) -->
    <linearGradient id="border-base" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27272a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>

    <linearGradient id="border-sweep" x1="0%" y1="0%" x2="0%" y2="0%" gradientUnits="userSpaceOnUse">
      <animate attributeName="x1" from="-100%" to="200%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0%" to="300%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y1" from="-50%" to="150%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y2" from="50%" to="250%" dur="8s" repeatCount="indefinite"/>
      <stop offset="0%" stop-color="#27272a" stop-opacity="1"/>
      <stop offset="45%" stop-color="#27272a" stop-opacity="1"/>
      <stop offset="50%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#27272a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#27272a" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="830" height="240" rx="16" fill="url(#bg-grad)"/>

  <!-- Glowing Accents -->
  <rect width="830" height="240" rx="16" fill="url(#glow-tr)"/>
  <rect width="830" height="240" rx="16" fill="url(#glow-bl)"/>
  <rect width="830" height="240" rx="16" fill="url(#glow-center)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Floating Particles -->
  <g>
    <!-- Particle 1 -->
    <circle cx="120" cy="70" r="1.5" fill="#3b82f6">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;60;70" dur="10s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 2 -->
    <circle cx="710" cy="170" r="2" fill="#8b5cf6">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;185;170" dur="12s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 3 -->
    <circle cx="450" cy="45" r="1.2" fill="#ffffff">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="450;460;450" dur="8s" repeatCount="indefinite"/>
    </circle>
    <!-- Particle 4 -->
    <circle cx="280" cy="190" r="1.5" fill="#3b82f6">
      <animate attributeName="opacity" values="0.15;0.65;0.15" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="190;200;190" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Animated Border Sweep -->
  <rect x="0.75" y="0.75" width="828.5" height="238.5" rx="15.25" fill="none" stroke="url(#border-sweep)" stroke-width="1.5"/>

  <!-- Text Hierarchy -->
  <g transform="translate(0, 0)">
    <!-- Subtitle (Top Accent) -->
    <text x="415" y="80" class="text-title" text-anchor="middle">Founder &amp; CEO — Maini Labs</text>
    
    <!-- Name -->
    <text x="415" y="130" class="text-name" text-anchor="middle">Adhyayan Maini</text>
    
    <!-- Subtitle / Mission Statement -->
    <text x="415" y="172" class="text-subtitle" text-anchor="middle">Building AI agents, automation systems, and software.</text>
  </g>
</svg>
