<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Outfit:wght@600;700;800&amp;display=swap');
      
      .text-title {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 22px;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: 0.5px;
      }
      
      .desc-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #a1a1aa;
        line-height: 1.5;
      }
      
      .badge-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 11px;
        font-weight: 500;
        fill: #a1a1aa;
      }
      
      .btn-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        font-weight: 600;
        fill: #ffffff;
      }

      .card-border {
        stroke: #27272a;
        transition: stroke 0.3s ease;
      }
      
      .btn-box {
        fill: #18181b;
        stroke: #3b82f6;
        stroke-width: 1.2;
        transition: fill 0.3s, stroke-width 0.3s;
      }
    </style>

    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#020204"/>
    </linearGradient>

    <!-- Logo Gradients -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <radialGradient id="logo-grad-radial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Glowing Accent -->
    <radialGradient id="card-glow" cx="10% " cy="30%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background Card -->
  <rect width="830" height="200" rx="16" fill="url(#bg-grad)"/>
  <rect width="830" height="200" rx="16" fill="url(#card-glow)"/>
  <rect x="0.75" y="0.75" width="828.5" height="198.5" rx="15.25" fill="none" class="card-border" stroke-width="1.5"/>

  <!-- Logo (Hexagonal Modern Shape) -->
  <g transform="translate(40, 35)">
    <polygon points="20,0 40,11.5 40,34.5 20,46 0,34.5 0,11.5" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="20,7 33.5,15 33.5,31 20,39 6.5,31 6.5,15" fill="url(#logo-grad-radial)" stroke="url(#logo-grad)" stroke-width="1" stroke-linejoin="round" opacity="0.7"/>
    <circle cx="20" cy="23" r="3.5" fill="#ffffff">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main Content -->
  <!-- Title -->
  <text x="100" y="56" class="text-title">MAINI LABS</text>

  <!-- Description (Safely wrapped across two lines) -->
  <text x="100" y="86" class="desc-text">An AI-first software company focused on replacing repetitive manual work</text>
  <text x="100" y="106" class="desc-text">with intelligent AI agents and automation.</text>

  <!-- Badges / Pill Tags -->
  <!-- AI Agents -->
  <g>
    <rect x="100" y="136" width="80" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="140" y="152" class="badge-text" text-anchor="middle">AI Agents</text>
  </g>

  <!-- Business Automation -->
  <g>
    <rect x="190" y="136" width="138" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="259" y="152" class="badge-text" text-anchor="middle">Business Automation</text>
  </g>

  <!-- Internal Tools -->
  <g>
    <rect x="338" y="136" width="102" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="389" y="152" class="badge-text" text-anchor="middle">Internal Tools</text>
  </g>

  <!-- Custom Software -->
  <g>
    <rect x="450" y="136" width="114" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="507" y="152" class="badge-text" text-anchor="middle">Custom Software</text>
  </g>

  <!-- Web Applications -->
  <g>
    <rect x="574" y="136" width="122" height="24" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    <text x="635" y="152" class="badge-text" text-anchor="middle">Web Applications</text>
  </g>

  <!-- Interactive Premium Website Button (CTA) -->
  <g>
    <!-- Outer Glow for Button -->
    <rect x="670" y="38" width="120" height="34" rx="8" fill="#3b82f6" opacity="0.15" filter="blur(2px)"/>
    <!-- Button Rect -->
    <rect x="670" y="38" width="120" height="34" rx="8" class="btn-box"/>
    <!-- Button Text -->
    <text x="730" y="59" class="btn-text" text-anchor="middle">mainilabs.xyz →</text>
  </g>
</svg>
